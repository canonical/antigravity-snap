name: antigravity
base: core24
version: '2.1.4'
title: Antigravity
summary: Antigravity
icon: snap/gui/icon.png
description: |
  Google Antigravity — Build the new way.

  Your command center to manage multiple local agents in parallel. Group conversations into Projects, operate across multiple workspaces, and automate routine tasks with scheduled messages.
website: https://antigravity.google/
contact: https://antigravity.google/

grade: stable
confinement: strict

platforms:
  amd64:
  arm64:

plugs:
  shared-memory:
    interface: shared-memory
    private: true

apps:
  antigravity:
    extensions:
      - gnome
    command: bin/antigravity
    desktop: share/applications/antigravity.desktop
    environment:
      TMPDIR: $XDG_RUNTIME_DIR
    plugs:
      - audio-playback
      - audio-record
      - camera      
      - cups-control
      - home
      - network
      - network-bind
      - opengl
      - password-manager-service
      - removable-media
      - shared-memory
      - wayland
      - x11

parts:
  antigravity:
    plugin: dump
    source: .
    override-pull: |
      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64)
          URL=https://storage.googleapis.com/antigravity-public/antigravity-hub/2.1.4-6481382726303744/linux-x64/Antigravity.tar.gz
          DIR=Antigravity-x64
          ;;
        arm64)
          URL=https://storage.googleapis.com/antigravity-public/antigravity-hub/2.1.4-6481382726303744/linux-arm/Antigravity.tar.gz
          DIR=Antigravity-arm64
          ;;
        *)
          echo "Unsupported architecture: $CRAFT_ARCH_BUILD_FOR"
          exit 1
          ;;
      esac
      mkdir -p opt share/icons/hicolor/256x256/apps share/applications bin
      curl -L "$URL" | tar -xz
      mv "$DIR" opt/antigravity
      install -Dm644 "$CRAFT_PROJECT_DIR/snap/icon.png" share/icons/hicolor/256x256/apps/antigravity.png
      install -Dm755 "$CRAFT_PROJECT_DIR/snap/local/antigravity-wrapper" bin/antigravity
      install -Dm644 "$CRAFT_PROJECT_DIR/snap/local/antigravity.desktop" share/applications/antigravity.desktop
    build-packages:
      - curl
    stage-packages:
      - libnss-wrapper
    build-attributes:
      - enable-patchelf
